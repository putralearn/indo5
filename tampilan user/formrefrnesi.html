    <div class="container">
        <div class="form-header">
            <h1>📄 Surat Referensi</h1>
            <p>Isi formulir berikut untuk pengajuan surat referensi kerja. Semua field bertanda * wajib diisi.</p>
        </div>
        <form class="form-card" onsubmit="submitForm(event)">

            <div class="section-label">Informasi Pribadi</div>
            <div class="grid-2">
                <div class="field"><label>Nama Sesuai KTP <span class="req">*</span></label><input type="text" required
                        placeholder="Nama lengkap sesuai KTP"></div>
                <div class="field"><label>No KTP <span class="req">*</span></label><input type="text" required
                        placeholder="16 digit NIK"></div>
            </div>
            <div class="grid-2">
                <div class="field"><label>Email <span class="req">*</span></label><input type="email" required
                        placeholder="email@gmail.com"></div>
                <div class="field"><label>No Telepon / WhatsApp Aktif <span class="req">*</span></label><input
                        type="tel" required placeholder="08xxxxxxxxxx"></div>
            </div>
            <div class="field"><label>Alamat Lengkap Sesuai KTP <span class="req">*</span></label>
                <textarea required
                    placeholder="contoh: Jl Kutisari No.04, RT/02 RW/01, Tenggilis, Tenggilis Mejoyo, Surabaya"></textarea>
                <div class="hint">Cantumkan RT/RW/Desa/Kec/Kab</div>
            </div>
            <div class="grid-2">
                <div class="field"><label>Tempat Lahir <span class="req">*</span></label><input type="text" required
                        placeholder="Kota tempat lahir"></div>
                <div class="field"><label>Tanggal Lahir <span class="req">*</span></label><input type="date" required>
                </div>
            </div>
            <div class="field"><label>Jenis Kelamin <span class="req">*</span></label>
                <div class="radio-group">
                    <label class="radio-item"><input type="radio" name="jk" required> Laki-Laki</label>
                    <label class="radio-item"><input type="radio" name="jk"> Perempuan</label>
                </div>
            </div>

            <div class="section-label">Informasi Kerja</div>
            <div class="grid-2">
                <div class="field"><label>Nama Project <span class="req">*</span></label><input type="text" required
                        placeholder="Nama project"></div>
                <div class="field"><label>Jabatan <span class="req">*</span></label><input type="text" required
                        placeholder="Jabatan kamu"></div>
            </div>
            <div class="grid-2">
                <div class="field"><label>Join Date <span class="req">*</span></label><input type="date" required></div>
                <div class="field"><label>End Date <span class="req">*</span></label><input type="date" required></div>
            </div>
            <div class="field"><label>Alasan Pembuatan Surat Referensi <span class="req">*</span></label>
                <div class="radio-group">
                    <label class="radio-item"><input type="radio" name="alasan" required> Habis Kontrak</label>
                    <label class="radio-item"><input type="radio" name="alasan"> Mengundurkan Diri</label>
                </div>
            </div>

            <div class="section-label">Dokumen</div>
            <div class="field"><label>Foto KTP <span class="req">*</span></label>
                <div class="file-upload">
                    <input type="file" accept="image/*" required>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="17 8 12 3 7 8" />
                        <line x1="12" y1="3" x2="12" y2="15" />
                    </svg>
                    <p>Klik untuk upload foto KTP<br><small>Maks 10 MB</small></p>
                    <div class="file-name"></div>
                </div>
            </div>

            <button type="submit" class="btn-submit">📤 Kirim Formulir</button>
        </form>
    </div>
    <div class="toast" id="toast"></div>
    <script>
        function applyTheme(t) { document.documentElement.setAttribute("data-theme", t); localStorage.setItem("theme", t); const m = document.getElementById("iconMoon"), s = document.getElementById("iconSun"); if (m) m.style.display = t === "dark" ? "none" : "block"; if (s) s.style.display = t === "dark" ? "block" : "none"; }
        function toggleTheme() { applyTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark"); }
        applyTheme(localStorage.getItem("theme") || "light");
        document.querySelectorAll(".file-upload input").forEach(inp => { inp.addEventListener("change", function () { const fn = this.closest(".file-upload").querySelector(".file-name"); if (fn) { fn.textContent = this.files[0] ? this.files[0].name : ""; fn.style.display = this.files[0] ? "block" : "none"; } }); });
        function showToast(msg) { const t = document.getElementById("toast"); t.textContent = msg; t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 3000); }
        function submitForm(e) { e.preventDefault(); showToast("✅ Formulir Surat Referensi berhasil dikirim!"); setTimeout(() => e.target.reset(), 3200); }
    </script>

    <div class="toast"></div>

    <script src="userform.js"></script>
</body>
