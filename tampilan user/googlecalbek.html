<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Google Login...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #f5f5f5;
            color: #333;
            flex-direction: column;
            gap: 16px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #eee;
            border-top: 4px solid #8B0000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        p {
            font-size: 14px;
            color: #666;
        }
    </style>
</head>

<body>
    <div class="spinner"></div>
    <p>Memproses login Google...</p>

    <script>
        // Ambil access token dari URL hash (#access_token=...)
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const accessToken = params.get('access_token');

        if (accessToken) {
            // Ambil data user dari Google API
            fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                headers: { Authorization: 'Bearer ' + accessToken }
            })
                .then(r => r.json())
                .then(user => {
                    // Kirim data ke window parent (halaman loginuser.html)
                    if (window.opener) {
                        window.opener.postMessage({
                            type: 'GOOGLE_LOGIN_SUCCESS',
                            name: user.name || user.email,
                            email: user.email || '',
                            picture: user.picture || ''
                        }, '*');
                    }
                    window.close();
                })
                .catch(() => {
                    document.querySelector('p').textContent = '❌ Gagal, silakan coba lagi.';
                    setTimeout(() => window.close(), 2000);
                });
        } else {
            // Tidak ada token = user cancel atau error
            document.querySelector('p').textContent = 'Login dibatalkan.';
            setTimeout(() => window.close(), 1500);
        }
    </script>
</body>

</html>
